name: PantryPilot
options:
  bundleIdPrefix: com.pantrypilot
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    SWIFT_STRICT_CONCURRENCY: minimal

targets:
  PantryPilot:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: PantryPilot
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pantrypilot.app
        PRODUCT_NAME: PantryPilot
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_CFBundleDisplayName: PantryPilot
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_EMIT_LOC_STRINGS: YES
      configs:
        debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
    info:
      path: PantryPilot/Resources/Info.plist
      properties:
        CFBundleDisplayName: PantryPilot
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSCameraUsageDescription: "PantryPilot uses the camera to scan barcodes and photograph pantry items."
        NSPhotoLibraryUsageDescription: "PantryPilot lets you attach photos to your pantry items."
        ITSAppUsesNonExemptEncryption: false
